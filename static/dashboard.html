<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analytics Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .card { background: #1e293b; border-radius: 0.75rem; padding: 1.25rem; }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.25rem; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; color: #e2e8f0; font-size: 0.9rem; margin-bottom: 0.75rem; }
    button { width: 100%; padding: 0.6rem; border-radius: 0.5rem; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary { background: #0284c7; color: white; }
    .btn-primary:hover { background: #0369a1; }
    .btn-danger { background: #dc2626; color: white; margin-top: 0.5rem; }
    .status { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .dot.connected { background: #22c55e; }
    #log { list-style: none; max-height: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
    #log li { background: #0f172a; border-radius: 0.5rem; padding: 0.6rem 0.75rem; font-size: 0.8rem; border-left: 3px solid #0284c7; }
    #log li.event { border-left-color: #22c55e; }
    #log li.error { border-left-color: #ef4444; }
    .ts { color: #64748b; margin-right: 0.5rem; }
    .tag { display: inline-block; background: #1d4ed8; color: #bfdbfe; border-radius: 0.25rem; padding: 0.1rem 0.4rem; font-size: 0.75rem; margin-right: 0.4rem; }
    .funnel-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid #334155; font-size: 0.85rem; }
    .funnel-row:last-child { border-bottom: none; }
    .badge { background: #0284c7; color: white; border-radius: 0.25rem; padding: 0.1rem 0.5rem; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Real-Time Analytics Dashboard</h1>
  <div class="grid">

    <!-- LEFT: WebSocket + Event Sender -->
    <div style="display:flex;flex-direction:column;gap:1rem;">

      <div class="card">
        <h2>WebSocket Connection</h2>
        <label>Dashboard ID</label>
        <input id="dashId" value="demo" />
        <button class="btn-primary" onclick="connect()">Connect</button>
        <button class="btn-danger" onclick="disconnect()">Disconnect</button>
        <div class="status" style="margin-top:1rem;">
          <div class="dot" id="dot"></div>
          <span id="statusText">Disconnected</span>
        </div>
      </div>

      <div class="card">
        <h2>Send Event</h2>
        <label>Event Type</label>
        <input id="evtType" value="page_view" />
        <label>Properties (JSON)</label>
        <input id="evtProps" value='{"url": "/home"}' />
        <button class="btn-primary" onclick="sendEvent()">Track Event</button>
      </div>

    </div>

    <!-- RIGHT: Live log + Funnel -->
    <div style="display:flex;flex-direction:column;gap:1rem;">

      <div class="card" style="flex:1;">
        <h2>Live Event Stream</h2>
        <ul id="log"></ul>
      </div>

      <div class="card">
        <h2>Funnel</h2>
        <label>Steps (comma-separated)</label>
        <input id="funnelSteps" value="page_view,signup,purchase" />
        <button class="btn-primary" onclick="loadFunnel()">Calculate</button>
        <div id="funnelResult" style="margin-top:0.75rem;"></div>
      </div>

    </div>
  </div>

  <script>
    let ws = null;

    function log(msg, cls = '') {
      const li = document.createElement('li');
      if (cls) li.className = cls;
      const ts = new Date().toLocaleTimeString();
      li.innerHTML = `<span class="ts">${ts}</span>${msg}`;
      const ul = document.getElementById('log');
      ul.prepend(li);
    }

    function setStatus(connected) {
      document.getElementById('dot').className = 'dot' + (connected ? ' connected' : '');
      document.getElementById('statusText').textContent = connected ? 'Connected' : 'Disconnected';
    }

    function connect() {
      if (ws) ws.close();
      const id = document.getElementById('dashId').value.trim() || 'demo';
      ws = new WebSocket(`ws://localhost:8000/ws/dashboard/${id}`);
      ws.onopen = () => setStatus(true);
      ws.onclose = () => { setStatus(false); log('WebSocket closed', 'error'); };
      ws.onerror = () => log('WebSocket error', 'error');
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'connected') {
          log(`Connected to <b>${data.dashboard_id}</b> (clients: ${data.clients})`);
        } else if (data.type === 'new_event') {
          const ev = data.data;
          log(`<span class="tag">${ev.event_type}</span>${JSON.stringify(ev.properties)}`, 'event');
        }
      };
    }

    function disconnect() {
      if (ws) { ws.close(); ws = null; }
    }

    async function sendEvent() {
      const dashId = document.getElementById('dashId').value.trim() || 'demo';
      const evtType = document.getElementById('evtType').value.trim();
      let props = {};
      try { props = JSON.parse(document.getElementById('evtProps').value); } catch {}
      const res = await fetch('/events/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_type: evtType, dashboard_id: dashId, properties: props })
      });
      const data = await res.json();
      log(`Sent <span class="tag">${data.event_type}</span> id:${data.id}`);
    }

    async function loadFunnel() {
      const dashId = document.getElementById('dashId').value.trim() || 'demo';
      const steps = document.getElementById('funnelSteps').value.trim();
      const res = await fetch(`/analytics/funnel?steps=${encodeURIComponent(steps)}&dashboard_id=${dashId}&hours=24`);
      const data = await res.json();
      const html = data.steps.map(s =>
        `<div class="funnel-row">
          <span>${s.event_type}</span>
          <span>
            <span class="badge">${s.count}</span>
            ${s.conversion_rate != null ? `<span style="color:#94a3b8;font-size:0.75rem;margin-left:0.4rem;">${s.conversion_rate}%</span>` : ''}
          </span>
        </div>`
      ).join('');
      document.getElementById('funnelResult').innerHTML = html;
    }
  </script>
</body>
</html>
